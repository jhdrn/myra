version: 2.1
jobs:
  test-node:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run type checking
          command: npm run typecheck
      - run:
          name: Run lint
          command: npm run lint
      - run:
          name: Run tests
          command: npm test
      - run:
          name: Generate coverage
          command: npm run coverage
      - run:
          name: Upload coverage
          command: |
            CODECOV_VERSION=v0.7.3
            curl -Os https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov
            curl -Os https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM
            sha256sum -c codecov.SHA256SUM
            chmod +x codecov && ./codecov
      - run:
          name: Build production package
          command: npm run build
      - run:
          name: Run package smoke tests
          command: npm run test:package

workflows:
  test:
    jobs:
      - test-node
